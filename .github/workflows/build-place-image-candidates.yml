name: Build place image candidates

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional limit for test runs, for example 10. Use 0 or empty for no limit."
        required: false
        default: "10"
      debug:
        description: "Enable debug output"
        required: false
        type: boolean
        default: true
      include_existing:
        description: "Include places that already have image/cardImage"
        required: false
        type: boolean
        default: false
      commit_output:
        description: "Commit data/places/place_image_candidates.json back to the repo"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-place-image-candidates:
    name: Build place image candidates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check builder script syntax
        run: node --check tools/build_place_image_candidates.mjs

      - name: Build place image candidates
        shell: bash
        run: |
          set -euo pipefail

          cmd=(node tools/build_place_image_candidates.mjs)

          if [[ "${{ inputs.debug }}" == "true" ]]; then
            cmd+=(--debug)
          fi

          if [[ "${{ inputs.include_existing }}" == "true" ]]; then
            cmd+=(--include-existing)
          fi

          limit_value="${{ inputs.limit }}"
          if [[ -n "$limit_value" ]] && [[ "$limit_value" =~ ^[0-9]+$ ]] && (( limit_value > 0 )); then
            cmd+=("--limit=${limit_value}")
          fi

          echo "Running: ${cmd[*]}"
          "${cmd[@]}"

      - name: Verify output file exists
        run: test -f data/places/place_image_candidates.json

      - name: Print summary
        run: |
          node <<'NODE'
          const fs = require("fs");
          const file = "data/places/place_image_candidates.json";
          const data = JSON.parse(fs.readFileSync(file, "utf8"));
          const counts = data.meta?.counts || {};
          const diagnostics = data.meta?.diagnostics || {};
          const summary = {
            schema: data.schema || null,
            manifestFiles: counts.manifestFiles ?? null,
            placesTotal: counts.placesTotal ?? null,
            placesChecked: counts.placesChecked ?? null,
            placesWithCandidates: counts.placesWithCandidates ?? null,
            candidatesTotal: counts.candidatesTotal ?? null,
            diagnostics
          };
          console.log(JSON.stringify(summary, null, 2));
          NODE

      - name: Commit candidate file
        if: ${{ inputs.commit_output == true }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/places/place_image_candidates.json

          if git diff --cached --quiet; then
            echo "No candidate file changes to commit."
            exit 0
          fi

          git commit -m "Update place image candidate review file"
          git push

      - name: Upload candidate artifact
        # Download and review this artifact manually before running tools/apply_place_image_candidates.mjs.
        uses: actions/upload-artifact@v4
        with:
          name: place-image-candidates
          path: data/places/place_image_candidates.json
          if-no-files-found: error
