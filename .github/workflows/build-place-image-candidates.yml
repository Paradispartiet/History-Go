name: Build Place Image Candidates

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Optional limit for test runs (e.g. 10). Use 0 or empty for no limit.'
        required: false
        default: '0'
      debug:
        description: 'Enable debug output'
        required: false
        type: boolean
        default: true
      include_existing:
        description: 'Include places that already have image entries'
        required: false
        type: boolean
        default: false

jobs:
  build-place-image-candidates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check builder script syntax
        run: node --check tools/build_place_image_candidates.mjs

      - name: Build place image candidates
        shell: bash
        run: |
          set -euo pipefail

          cmd=(node tools/build_place_image_candidates.mjs)

          if [[ "${{ inputs.debug }}" == 'true' ]]; then
            cmd+=(--debug)
          fi

          if [[ "${{ inputs.include_existing }}" == 'true' ]]; then
            cmd+=(--include-existing)
          fi

          if [[ -n "${{ inputs.limit }}" ]] && [[ "${{ inputs.limit }}" =~ ^[0-9]+$ ]] && (( ${{ inputs.limit }} > 0 )); then
            cmd+=("--limit=${{ inputs.limit }}")
          fi

          echo "Running: ${cmd[*]}"
          "${cmd[@]}"

      - name: Verify output file exists
        run: |
          test -f data/places/place_image_candidates.json

      - name: Print summary
        run: |
          node -e "const fs = require('fs'); const p = 'data/places/place_image_candidates.json'; const data = JSON.parse(fs.readFileSync(p, 'utf8')); const out = { schema: data.schema ?? null, manifestFiles: Array.isArray(data.manifestFiles) ? data.manifestFiles.length : 0, placesTotal: data.placesTotal ?? 0, placesChecked: data.placesChecked ?? 0, placesWithCandidates: data.placesWithCandidates ?? 0, candidatesTotal: data.candidatesTotal ?? 0, diagnostics: data.diagnostics ?? {} }; console.log(JSON.stringify(out, null, 2));"

      - name: Upload candidate artifact
        # Artifact must be downloaded and reviewed manually before running tools/apply_place_image_candidates.mjs.
        uses: actions/upload-artifact@v4
        with:
          name: place-image-candidates
          path: data/places/place_image_candidates.json
          if-no-files-found: error
