name: Apply approved place image candidates (manual, safe)

on:
  workflow_dispatch:
    inputs:
      approved_ids:
        description: "Comma-separated place.id values to apply from the candidate file"
        required: true
        default: ""
      commit_output:
        description: "Commit applied images and updated place data to branch"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      commit_branch:
        description: "Branch to commit apply output to"
        required: false
        default: "image-apply-output"
      overwrite:
        description: "Overwrite existing image/cardImage values"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:
  apply-approved-place-images:
    name: Apply reviewed place image candidates
    runs-on: ubuntu-latest

    env:
      CANDIDATES_FILE: data/places/place_image_candidates.json
      PLACES_INDEX_FILE: data/places/places_index.json
      APPROVED_IDS: ${{ inputs.approved_ids }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies and build tools
        run: |
          npm ci
          npm run build:tools

      - name: Preflight approved candidates
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const candidatePath = process.env.CANDIDATES_FILE;
          const approvedIds = (process.env.APPROVED_IDS || "")
            .split(",")
            .map((id) => id.trim())
            .filter(Boolean);

          if (!approvedIds.length) throw new Error("approved_ids must contain at least one place.id.");
          if (new Set(approvedIds).size !== approvedIds.length) throw new Error("approved_ids contains duplicate IDs.");

          const candidates = JSON.parse(fs.readFileSync(candidatePath, "utf8"));
          if (candidates?.schema !== "historygo_place_image_candidates_v1") {
            throw new Error(`${candidatePath} has unknown schema: ${candidates?.schema}`);
          }

          const places = Array.isArray(candidates.places) ? candidates.places : [];
          const byId = new Map(places.map((place) => [place?.id, place]));
          const touchedSourceFiles = new Set();
          const touchedImages = new Set();

          for (const id of approvedIds) {
            const place = byId.get(id);
            if (!place) throw new Error(`${id} is missing from ${candidatePath}.`);
            if (typeof place.sourceFile !== "string" || !place.sourceFile.startsWith("data/places/")) {
              throw new Error(`${id} has invalid sourceFile: ${place.sourceFile}`);
            }

            const candidatesForPlace = Array.isArray(place.candidates) ? place.candidates : [];
            if (!candidatesForPlace.length) throw new Error(`${id} has no candidates.`);
            const candidate = candidatesForPlace[0];
            if (!candidate?.originalUrl) throw new Error(`${id} first candidate is missing originalUrl.`);

            const suggested = candidate.suggested || {};
            const image = typeof suggested.image === "string" ? suggested.image.trim() : "";
            const cardImage = typeof suggested.cardImage === "string" ? suggested.cardImage.trim() : "";
            if (!image || !image.startsWith("bilder/places/auto/")) {
              throw new Error(`${id} suggested.image must exist and start with bilder/places/auto/.`);
            }
            if (cardImage && !cardImage.startsWith("bilder/places/auto/")) {
              throw new Error(`${id} suggested.cardImage must start with bilder/places/auto/ when set.`);
            }
            if (image && cardImage && image === cardImage) {
              throw new Error(`${id} suggested.image and suggested.cardImage must not be the same file.`);
            }

            touchedSourceFiles.add(place.sourceFile);
            touchedImages.add(image);
          }

          const summary = [
            "preflight-summary",
            `approvedIds=${approvedIds.join(",")}`,
            `candidatePlaces=${places.length}`,
            `sourceFiles=${[...touchedSourceFiles].join(",")}`,
            `images=${[...touchedImages].join(",")}`
          ].join("\n");
          console.log(summary);
          if (process.env.GITHUB_STEP_SUMMARY) fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${summary}\n`, "utf8");
          NODE

      - name: Apply approved place image candidates
        shell: bash
        run: |
          set -euo pipefail
          cmd=(node dist/tools/apply_place_image_candidates.mjs "--approved-ids=${APPROVED_IDS}")
          if [[ "${{ inputs.overwrite }}" == "true" ]]; then
            cmd+=(--overwrite)
          fi
          echo "Running: ${cmd[*]}"
          "${cmd[@]}"

      - name: Verify candidate file unchanged and outputs exist
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const candidates = JSON.parse(fs.readFileSync(process.env.CANDIDATES_FILE, "utf8"));
          const approvedIds = process.env.APPROVED_IDS.split(",").map((id) => id.trim()).filter(Boolean);
          const byId = new Map((candidates.places || []).map((place) => [place.id, place]));
          for (const id of approvedIds) {
            const place = byId.get(id);
            const image = place.candidates[0].suggested.image;
            if (!fs.existsSync(image)) throw new Error(`${image} was not created.`);
            const stat = fs.statSync(image);
            if (!stat.isFile() || stat.size <= 0) throw new Error(`${image} is empty or not a file.`);
            const sourcePlaces = JSON.parse(fs.readFileSync(place.sourceFile, "utf8"));
            const sourcePlace = sourcePlaces.find((entry) => entry?.id === id);
            if (!sourcePlace) throw new Error(`${id} is missing from ${place.sourceFile} after apply.`);
            if (!sourcePlace.imageMeta || typeof sourcePlace.imageMeta !== "object") throw new Error(`${id} missing imageMeta after apply.`);
          }
          console.log("Verified applied images and updated target source files.");
          NODE

      - name: Rebuild places index
        run: node dist/tools/build_places_index.mjs

      - name: Check places index sync
        run: node dist/tools/check_places_index_sync.mjs

      - name: Upload applied output artifact
        uses: actions/upload-artifact@v4
        with:
          name: applied-place-images
          path: |
            bilder/places/auto/**
            data/places/**
          if-no-files-found: error

      - name: Commit applied output to branch
        if: ${{ inputs.commit_output == 'true' }}
        env:
          TARGET_BRANCH: ${{ inputs.commit_branch }}
        run: |
          set -euo pipefail
          if [ -z "${TARGET_BRANCH}" ]; then echo "commit_branch cannot be empty."; exit 1; fi
          case "${TARGET_BRANCH}" in main|master|refs/heads/main|refs/heads/master) echo "Refusing to push directly to ${TARGET_BRANCH}."; exit 1;; esac
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "${TARGET_BRANCH}"
          git add bilder/places/auto data/places
          if git diff --cached --quiet; then echo "No applied image output changes to commit."; exit 0; fi
          git commit -m "chore(data): apply reviewed place images"
          git push origin "HEAD:${TARGET_BRANCH}" --force-with-lease
