name: TypeScript guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck-build:
    name: TypeScript typecheck and build guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck root baseline
        run: npm run typecheck

      - name: Typecheck scripts
        run: npm run typecheck:scripts

      - name: Build scripts
        run: npm run build:scripts

      - name: Typecheck tools
        run: npm run typecheck:tools

      - name: Build tools
        run: npm run build:tools
