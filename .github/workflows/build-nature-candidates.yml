name: Build nature candidates

on:
  workflow_dispatch:
    inputs:
      commit_output:
        description: "Commit data/natur/nature_place_map_candidates.json back to main when output is valid"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: build-nature-candidates-main
  cancel-in-progress: false

env:
  NATURE_CANDIDATES_FINAL: data/natur/nature_place_map_candidates.json
  NATURE_CANDIDATES_TMP: data/natur/.tmp_nature_place_map_candidates.json

jobs:
  build:
    name: Build validated Artskart candidates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check scripts
        run: |
          node --check tools/validate_nature_maps.mjs
          node --check tools/build_nature_place_candidates_v2.mjs

      - name: Validate active nature maps
        run: node tools/validate_nature_maps.mjs

      - name: Build candidates from Artskart into temp file
        run: node tools/build_nature_place_candidates_v2.mjs --out="$NATURE_CANDIDATES_TMP" --retries=4 --retry-base-delay-ms=1500

      - name: Validate and summarize temp candidate output
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const tmp = process.env.NATURE_CANDIDATES_TMP;
          const data = JSON.parse(fs.readFileSync(tmp, 'utf8'));
          const counts = data.meta?.counts || {};
          const places = data.places || {};
          const values = Object.values(places);
          const errors = values.filter(x => x?.status === 'error');
          const candidateFromArtskart = values.filter(x => x?.status === 'candidate_from_artskart').length;
          const withFlora = values.filter(x => Array.isArray(x.flora) && x.flora.length).length;
          const withFauna = values.filter(x => Array.isArray(x.fauna) && x.fauna.length).length;
          const withExternalTaxa = values.filter(x => Array.isArray(x.externalTaxa) && x.externalTaxa.length).length;

          const summary = {
            counts,
            places: values.length,
            errors: errors.length,
            candidateFromArtskart,
            withFlora,
            withFauna,
            withExternalTaxa
          };
          console.log(JSON.stringify(summary, null, 2));

          if (!values.length) {
            throw new Error('Temp candidate file has no places. Refusing to continue.');
          }

          if (errors.length) {
            const sample = errors.slice(0, 10).map(x => `${x.name || 'unknown'}: ${x.error || 'unknown error'}`).join('\n');
            throw new Error(`Temp candidate file contains ${errors.length} error entries. Refusing to replace final output.\n${sample}`);
          }

          if (candidateFromArtskart !== values.length) {
            throw new Error(`Expected all places to have status candidate_from_artskart, got ${candidateFromArtskart}/${values.length}.`);
          }
          NODE

      - name: Promote temp candidate file
        run: cp "$NATURE_CANDIDATES_TMP" "$NATURE_CANDIDATES_FINAL"

      - name: Commit candidate file
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_output == true }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$NATURE_CANDIDATES_FINAL"

          if git diff --cached --quiet; then
            echo "No candidate file changes to commit."
            exit 0
          fi

          git commit -m "Update nature place map candidates from Artskart"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}"
            git pull --rebase origin main

            if git push origin HEAD:main; then
              echo "Pushed candidate file to main."
              exit 0
            fi

            echo "Push failed, retrying after refetch."
            sleep 2
          done

          echo "Failed to push after 3 attempts."
          exit 1

      - name: Upload candidate file
        uses: actions/upload-artifact@v4
        with:
          name: nature-place-map-candidates
          path: data/natur/nature_place_map_candidates.json
          if-no-files-found: error
