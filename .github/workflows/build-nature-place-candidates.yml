name: Nature data validation and candidates

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "tools/build_nature_place_candidates*.mjs"
      - "tools/validate_nature_maps.mjs"
      - "data/places/**"
      - "data/natur/**"
      - ".github/workflows/build-nature-place-candidates.yml"

permissions:
  contents: read

jobs:
  build:
    name: Validate maps and build Artskart candidates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate active nature maps
        run: node tools/validate_nature_maps.mjs

      - name: Build candidates from Artskart
        run: node tools/build_nature_place_candidates_v2.mjs

      - name: Print candidate summary
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const p = 'data/natur/nature_place_map_candidates.json';
          const data = JSON.parse(fs.readFileSync(p, 'utf8'));
          const counts = data.meta?.counts || {};
          const places = data.places || {};
          const checked = Object.keys(places).length;
          const withFlora = Object.values(places).filter(x => Array.isArray(x.flora) && x.flora.length).length;
          const withFauna = Object.values(places).filter(x => Array.isArray(x.fauna) && x.fauna.length).length;
          const withExternal = Object.values(places).filter(x => Array.isArray(x.externalTaxa) && x.externalTaxa.length).length;
          console.log(JSON.stringify({ counts, checked, withFlora, withFauna, withExternal }, null, 2));
          NODE

      - name: Upload candidate file
        uses: actions/upload-artifact@v4
        with:
          name: nature-place-map-candidates
          path: data/natur/nature_place_map_candidates.json
