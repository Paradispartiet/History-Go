name: Build nature place candidates

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "tools/build_nature_place_candidates.mjs"
      - ".github/workflows/build-nature-place-candidates.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build candidates from Artskart
        run: node tools/build_nature_place_candidates.mjs

      - name: Upload candidate file
        uses: actions/upload-artifact@v4
        with:
          name: nature-place-map-candidates
          path: data/natur/nature_place_map_candidates.json
