  <script>
  window.__lastRejection = null;

  window.addEventListener("unhandledrejection", (e) => {
    window.__lastRejection = e;

    console.error("[REAL UNHANDLED REJECTION]");
    console.error("reason:", e.reason);

    // Prøv å få tekst/stack hvis det finnes
    try { console.error("reason.message:", e.reason && e.reason.message); } catch {}
    try { console.error("reason.stack:", e.reason && e.reason.stack); } catch {}

    // Safari kan ha “tomme” objekter -> dump keys
    try { console.error("reason keys:", e.reason ? Object.keys(e.reason) : null); } catch {}

    // Viktig: hindrer dobbel logging/noise
    e.preventDefault();
  });

  window.addEventListener("error", (e) => {
    console.error("[WINDOW ERROR]", e.message, e.filename, e.lineno, e.colno);
    console.error(e.error && e.error.stack);
  });
</script>

  <script>
    // Tving linkBadges til å være kun tall (app.js kan skrive "12 merker")
  (function(){
    const el = document.getElementById("linkBadges");
    if(!el) return;

    function normalize(){
      const txt = (el.textContent || "").trim();
      const m = txt.match(/\d+/);
      el.textContent = m ? m[0] : "0";
    }

    // run now + hold it stable hvis app.js endrer igjen
    normalize();
    const obs = new MutationObserver(normalize);
    obs.observe(el, { childList:true, characterData:true, subtree:true });
  })();
</script>

<script>


  function setGeo(status) {
    const el = document.getElementById("geoStatus");
    if (!el) return;

    el.classList.remove("geo-ok","geo-bad","geo-unknown");

    if (status === "granted" || status === "test") {
      el.classList.add("geo-ok"); el.textContent = "📍";
    } else if (status === "blocked" || status === "unsupported") {
      el.classList.add("geo-bad"); el.textContent = "⛔";
    } else {
      el.classList.add("geo-unknown"); el.textContent = "…";
    }
  }

  window.addEventListener("hg:geo", (e) => {
    const st = e?.detail?.status || "unknown";
    setGeo(st);
  });


</script>
