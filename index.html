<!doctype html>
<html lang="nb" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>History Go</title>

  <script src="js/config.js"></script>

  <!-- MapLibre GL JS: MÅ lastes før js/map.js brukes (pinned versjon, ikke "latest"). -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js" crossorigin="anonymous"></script>

  <script>
  window.__lastRejection = null;
  window.addEventListener("unhandledrejection", (e) => {
    window.__lastRejection = e;

    console.error("[REAL UNHANDLED REJECTION]");
    console.error("reason:", e.reason);

    // Prøv å få tekst/stack hvis det finnes
    try { console.error("reason.message:", e.reason && e.reason.message); } catch {}
    try { console.error("reason.stack:", e.reason && e.reason.stack); } catch {}

    // Safari kan ha “tomme” objekter -> dump keys
    try { console.error("reason keys:", e.reason ? Object.keys(e.reason) : null); } catch {}

    // Viktig: hindrer dobbel logging/noise
    e.preventDefault();
  });

  window.addEventListener("error", (e) => {
    console.error("[WINDOW ERROR]", e.message, e.filename, e.lineno, e.colno);
    console.error(e.error && e.error.stack);
  });
</script>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/search.css">

  <link rel="stylesheet" href="css/miniProfile.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/merits.css">
  <link rel="stylesheet" href="css/civi.css">
  <link rel="stylesheet" href="css/quiz.css">
  <link rel="stylesheet" href="css/overlay.css">
  <link rel="stylesheet" href="css/effects.css">

  <link rel="stylesheet" href="css/placeCard.css">
  <link rel="stylesheet" href="css/wonderkammer.css">

  <link rel="stylesheet" href="css/nature.css">

<body class="hg-app">

  <!-- EGET KARTLAG -->
  <div id="mapLayer" aria-hidden="false">
    <div id="map" aria-label="Kart" data-hg-i18n-aria-label="ui.attr.map"></div>
  </div>

  <!-- HEADER -->
<header class="site-header">

  <img class="hg-brand" src="bilder/logo_historygo.PNG" alt="History GO">
   
  <div class="top-actions">

    <select id="languageSelect" class="top-lang-select" aria-label="Language" title="Språk" data-hg-i18n-aria-label="ui.attr.language" data-hg-i18n-title="ui.language.label" style="max-width:120px; font-size:1.15rem; padding:4px 8px;">
      <option value="nb" aria-label="Norsk" title="Norsk">🇳🇴</option>
      <option value="en" aria-label="English" title="English">🇬🇧</option>
      <option value="es" aria-label="Español" title="Español">🇪🇸</option>
      <option value="pt" aria-label="Português" title="Português">🇧🇷🇵🇹</option>
    </select>

    <a id="miniProfile" class="miniProfileTop" href="profile.html" aria-label="Profil" data-hg-i18n-aria-label="ui.attr.profile">
      <span id="miniName" class="mpt-name">Logg inn</span>

      <span class="mpt-badges" aria-label="Merker" data-hg-i18n-aria-label="ui.tabs.badges">
        <span class="mpt-badgeIcon" aria-hidden="true"></span>
        <span id="linkBadges" class="mpt-count">0</span>
      </span>

      <div class="mp-extra" aria-hidden="true">
        <p id="miniStats" class="muted">
          <span id="linkPlaces" class="linkish">0 steder</span>
          <span id="linkQuiz" class="linkish">0 quizzer</span>
        </p>

        <div id="miniBadges" class="profile-badges"></div>

        <div id="miniLastQuiz" class="profile-last-quiz" style="display:none;">
          <img id="miniLastQuizImg" src="">
          <span id="miniLastQuizName"></span>
        </div>
      </div>
    </a>

    <!-- Civication inngang -->
    <a href="/History-Go/Civication.html"
       class="iconbtn civication-nav-link"
       aria-label="Civication"
       title="Civication">
       <span aria-hidden="true">🏛</span>
       <span id="civicationUnreadBadge" class="nav-unread-badge" hidden aria-hidden="true"></span>
    </a>

    <button id="btnLesespor"
            class="iconbtn"
            type="button"
            aria-label="Lesespor"
            title="Lesespor"
            data-hg-i18n-aria-label="ui.nav.readingTracks"
            data-hg-i18n-title="ui.nav.readingTracks">
      📚
    </button>
   
    <button id="btnSeeMap" class="iconbtn" type="button" aria-label="Kartmodus" title="Kartmodus" data-hg-i18n-aria-label="ui.attr.mapMode" data-hg-i18n-title="ui.attr.mapMode">
      <span aria-hidden="true">⌖</span>
    </button>

    <input id="globalSearch" type="search" placeholder="Søk…" data-hg-i18n-placeholder="ui.attr.search" autocomplete="off">

    <span id="geoStatus" class="geo-status geo-unknown" title="Posisjonstatus" data-hg-i18n-title="ui.attr.positionStatus">📍</span>

    <button id="btnUnlockAll" class="iconbtn" type="button" aria-label="Unlock all" title="Unlock all" data-hg-i18n-aria-label="ui.attr.unlockAll" data-hg-i18n-title="ui.attr.unlockAll">🔓</button>
       
    <label class="toggle">
      <input id="openToggle" type="checkbox" />
      <span></span>
    </label>

  </div>

  <div id="searchResults"></div>

</header>

  <!-- utforsk-toggle: åpner/lukker nearby-draweren -->
  <button id="nearbyExploreToggle"
          type="button"
          aria-controls="nearbyListContainer"
          aria-expanded="false">
    <span aria-hidden="true">🧭</span>
    <span data-i18n="ui.static.explore">Utforsk</span>
  </button>

  <!-- nearbylistcontainer (Utforsk-drawer, lukket som standard) -->
  <div id="nearbyListContainer" class="leftpanel is-drawer-closed">

    <div class="leftpanel-head">
      <div class="leftpanel-title" data-i18n="ui.static.explore">Utforsk</div>

      <div class="nearby-row1">
        <div class="nearby-tabs" role="tablist" aria-label="Utforsk" data-hg-i18n-aria-label="ui.static.explore">

          <button id="nearbyFilterBtn"
                  class="nearby-filter-icon"
                  type="button"
                  aria-label="Filter" data-hg-i18n-aria-label="ui.attr.filter"></button>

          <button class="nearby-tab is-active"
                  data-leftmode="nearby"
                  data-i18n="ui.tabs.places"
                  type="button">Steder</button>

          <button class="nearby-tab"
                  data-leftmode="people"
                  data-i18n="ui.tabs.people"
                  type="button">Folk</button>

          <button class="nearby-tab"
                  data-leftmode="nature"
                  data-i18n="ui.tabs.nature"
                  type="button">Natur</button>

          <button class="nearby-tab"
                  data-leftmode="music"
                  type="button">Musikk</button>

          <button class="nearby-tab"
                  data-leftmode="routes"
                  data-i18n="ui.tabs.routes"
                  type="button">Ruter</button>

          <button class="nearby-tab"
                  data-leftmode="badges"
                  data-i18n="ui.tabs.badges"
                  type="button">Merker</button>

        </div>
      </div>

      <div class="nearby-row2">
        <div id="leftPeopleList" class="nearby-strip" hidden></div>
        <div id="nearbyList" class="nearby-strip"></div>
        <div id="leftNatureList" class="nearby-strip" hidden></div>
        <div id="leftMusicList" class="nearby-strip" hidden></div>
        <div id="leftRoutesList" class="nearby-strip" hidden></div>
        <div id="leftBadgesList" class="nearby-strip" hidden></div>
      </div>

    </div>
  </div>

  <!--
    APP-SHELL: det skalerte design-canvaset (900x1230) som ViewportManager
    transformerer. Kun de interne lagene som skal skaleres ligger her inne.
    #mapLayer, header.site-header, #nearbyListContainer og footer.app-footer
    er bevisst full-bleed UTENFOR app-shell: app-shell får transform, og en
    transformert forfar gjør position:fixed-barn relative til seg selv – da
    ville de full-bleed lagene mistet 100vw/100vh-forankringen til viewporten.
  -->
  <div class="app-shell">

    <!-- MAIN APP -->
    <main>
      <section id="panel" class="panel hidden"></section>
    </main>

  </div><!-- /.app-shell -->

  <!-- PLACE CARD -->
<div id="placeCard" aria-hidden="true">
  <button id="pcCollapseBtn"
          class="pc-collapse-btn"
          aria-label="Minimer" data-hg-i18n-aria-label="ui.attr.minimize">▾</button>

  <div class="pc-body">

    <!-- Tekst øverst -->
    <div class="pc-text">
      <h2 id="pcTitle"></h2>
      <div id="pcMeta" class="pc-meta"></div>
      <p id="pcDesc" class="pc-desc"></p>
    </div>

  <!-- 2x2 Grid -->
  <div class="pc-grid">

    <!-- 1: FrontcardImage -->
    <div class="pc-frontcard" id="pcFrontCardFlip" role="button" tabindex="0" aria-label="Vis quizkort" data-hg-i18n-aria-label="ui.attr.showQuizCard">
      <div class="pc-card-flip-inner">
        <div class="pc-card-face pc-card-face-front">
          <img id="pcFrontImage" src="" alt="">
        </div>
        <div class="pc-card-face pc-card-face-back">
          <div id="pcQuizCardBack" class="pc-quiz-card-back" aria-live="polite">
            <img id="pcQuizCardImage" class="pc-quiz-card-image" src="" alt="">
            <div id="pcQuizCardContent" class="pc-quiz-card-content" hidden></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 3: Ikon-kvadrat + På stedet -->
    <div class="pc-side-stack">
      <div class="pc-quad pc-icons-quad">
        <div id="pcPeopleIcon" class="pc-round"></div>
        <div id="pcNatureIcon" class="pc-round"></div>
        <div id="pcBadgesIcon" class="pc-round"></div>

        <div id="pcCivicationStoreIcon" class="pc-round"></div>

        <div id="pcBrandsIcon" class="pc-round"></div>
        <div id="pcLeksikonIcon" class="pc-round"></div>
        <div id="pcMusicIcon" class="pc-round" hidden></div>
      </div>

      <!-- 4: På stedet -->
      <div class="pc-quad pc-events-quad" id="pcEventsBox" aria-label="Det som skjer her" data-hg-i18n-aria-label="ui.attr.onSite">
        <div class="pc-events-head">
          <span class="pc-events-title" data-i18n="ui.static.onSite">På stedet</span>
          <button id="pcAddEvent" class="pc-events-add" type="button" aria-label="Legg til" data-hg-i18n-aria-label="ui.attr.add">＋</button>
        </div>
      </div>
    </div>

  </div>
    <div id="pcLesespor"></div>
    <div id="pcPeopleList"></div>
    <div id="pcNatureList"></div>
    <div id="pcBadgesList"></div>

    <div id="pcCivicationStoreList"></div>

    <div id="pcBrandsList"></div>
    <div id="pcLeksikonList"></div>
    <div id="pcMusicList"></div>
   </div>
 </div>

  <!-- FOOTER -->
  <footer class="site-footer app-footer" aria-label="Status og spillvalg">
    <div id="pcMini" class="pc-mini" aria-hidden="true">
      <img id="pcMiniImg" src="" alt="">
    </div>

    <div class="app-actions" aria-label="Stedshandlinger">
      <button id="pcInfo" class="pc-action pc-action-text" type="button" aria-label="Mer info" title="Mer info">Mer info</button>
      <button id="pcQuiz" class="pc-action pc-action-primary" type="button" aria-label="Ta quiz" title="Ta quiz">Ta quiz</button>
      <button id="pcUnlock" class="pc-action pc-action-primary" type="button" aria-label="Lås opp" title="Lås opp">Lås opp</button>
      <button id="pcRoute" class="pc-action pc-action-icon" type="button" aria-label="Rute" title="Rute"></button>
      <button id="pcObserve" class="pc-action pc-action-icon" type="button" aria-label="Observer" title="Observer"></button>
      <button id="pcNote" class="pc-action pc-action-icon" type="button" aria-label="Notat" title="Notat"></button>
    </div>
  </footer>

  <!-- App scripts -->
  <script src="js/i18n.js"></script>
  <script>
    window.addEventListener("hg:appReady", () => {
      if (document.querySelector('script[src="js/ui/badges.js"]')) return;
      const script = document.createElement("script");
      script.src = "js/ui/badges.js";
      document.body.appendChild(script);
    }, { once: true });
  </script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
