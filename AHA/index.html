<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AHA Dashboard</title>
  <link rel="stylesheet" href="aha-chat.css" />
</head>
<body>
  <h1>AHA Dashboard</h1>
  <p>AHA er deg. EchoNet er overbygningen. Disse modulene sender innhold inn i samme AHA-motor.</p>

  <div class="buttons">
    <a href="chat.html"><button>AHA Chat</button></a>
    <a href="notes.html"><button>Notes</button></a>
    <a href="gallery.html"><button>Galleri</button></a>
    <a href="feed.html"><button>Feed / Twitter</button></a>
    <a href="insta.html"><button>Insta</button></a>
    <button id="btn-import-hg">Importer History Go</button>
  </div>

  <div id="panel">
    <h3>Oversikt</h3>
    <ul>
      <li>Source events: <span id="count-sources">0</span></li>
      <li>Notes: <span id="count-notes">0</span></li>
      <li>Galleri-items: <span id="count-gallery">0</span></li>
      <li>Feed posts: <span id="count-feed">0</span></li>
      <li>Insta posts: <span id="count-insta">0</span></li>
    </ul>
  </div>

  <pre id="out"></pre>

  <script src="insightsChamber.js"></script>
  <script src="metaInsightsEngine.js"></script>
  <script src="ahaFieldProfiles.js"></script>
  <script src="ahaSources.js"></script>
  <script src="ahaIngest.js"></script>
  <script src="ahaHistoryGoImport.js"></script>
  <script>
    function setCount(id, key) {
      const el = document.getElementById(id);
      try {
        const value = JSON.parse(localStorage.getItem(key) || '[]');
        el.textContent = Array.isArray(value) ? value.length : 0;
      } catch {
        el.textContent = '0';
      }
    }

    function refreshCounts() {
      setCount('count-sources', 'aha_source_events_v1');
      setCount('count-notes', 'aha_notes_v1');
      setCount('count-gallery', 'aha_gallery_v1');
      setCount('count-feed', 'aha_feed_posts_v1');
      setCount('count-insta', 'aha_insta_posts_v1');
    }

    function log(msg) {
      const out = document.getElementById('out');
      if (out) out.textContent += msg + '\n';
    }

    document.getElementById('btn-import-hg').addEventListener('click', () => {
      if (window.AHAHistoryGoImport && typeof window.AHAHistoryGoImport.importHistoryGoDataFromSharedStorage === 'function') {
        const result = window.AHAHistoryGoImport.importHistoryGoDataFromSharedStorage();
        log('History Go import fullført: ' + JSON.stringify(result));
        refreshCounts();
      } else {
        log('AHAHistoryGoImport er ikke tilgjengelig.');
      }
    });

    document.addEventListener('aha:ingested', refreshCounts);
    refreshCounts();
  </script>
</body>
</html>
