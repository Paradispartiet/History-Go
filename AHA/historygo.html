<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>History Go i AHA</title>
  <link rel="stylesheet" href="aha-dashboard.css" />
  <style>
    .historygo-status-card { margin: 12px 0; padding: 12px; border-radius: 8px; background: #070b1a; border: 1px solid #222; }
    .historygo-payload-list { margin: 0; padding-left: 20px; }
    .historygo-import-event-list { margin-top: 8px; padding-left: 20px; }
    .historygo-import-event-item { margin-bottom: 8px; }
    .historygo-links { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>History Go i AHA</h1>
  <p>History Go er samlings- og læringsuniverset. AHA leser importert materiale som personlig innsikt.</p>

  <div class="historygo-links">
    <a href="index.html">Tilbake til AHA Home</a>
    <a href="/History-Go/">Åpne History Go</a>
  </div>

  <div class="buttons">
    <button id="historygo-refresh-btn">Oppdater</button>
    <button id="historygo-import-btn">Importer fra History Go</button>
  </div>

  <p id="historygo-status-message" aria-live="polite"></p>
  <div id="historygo-status-root"></div>

  <script src="insightsChamber.js"></script>
  <script src="ahaSources.js"></script>
  <script src="ahaIngest.js"></script>
  <script src="ahaHistoryGoImport.js"></script>
  <script src="ahaHistoryGoStatus.js"></script>
  <script>
    (function () {
      var refreshButton = document.getElementById('historygo-refresh-btn');
      var importButton = document.getElementById('historygo-import-btn');
      var statusMessage = document.getElementById('historygo-status-message');

      function setStatusMessage(message) {
        if (!statusMessage) return;
        statusMessage.textContent = String(message || '');
      }

      function refreshView() {
        if (window.AHAHistoryGoStatus && typeof window.AHAHistoryGoStatus.refresh === 'function') {
          window.AHAHistoryGoStatus.refresh();
        }
      }

      refreshButton.addEventListener('click', function () {
        refreshView();
        setStatusMessage('Status oppdatert.');
      });

      importButton.addEventListener('click', function () {
        if (!window.AHAHistoryGoImport || typeof window.AHAHistoryGoImport.importHistoryGoDataFromSharedStorage !== 'function') {
          setStatusMessage('Importadapter mangler.');
          return;
        }
        var result = window.AHAHistoryGoImport.importHistoryGoDataFromSharedStorage();
        refreshView();
        if (result && result.error) {
          setStatusMessage('Import feilet: ' + result.error);
          return;
        }
        setStatusMessage('Import fullført. Importerte signaler: ' + String((result && result.importedSignals) || 0));
      });

      refreshView();
    })();
  </script>
</body>
</html>
