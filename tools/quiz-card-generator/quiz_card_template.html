<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}} · History Go quizkort</title>
  <link rel="stylesheet" href="./quiz_card.css" />
</head>
<body>
  <main class="card" aria-label="History Go quizkort">
    <section class="paper">
      <header class="card-header">
        <div class="place-badge" aria-hidden="true">
          <svg viewBox="0 0 120 120" role="img">
            <circle cx="60" cy="60" r="54" fill="#0d2d4d" />
            <circle cx="60" cy="60" r="44" fill="none" stroke="#d6a33a" stroke-width="5" />
            <path d="M34 75 L60 30 L86 75 Z" fill="#f6ead2" opacity="0.95" />
            <rect x="43" y="75" width="34" height="14" rx="3" fill="#d6a33a" />
            <text x="60" y="103" text-anchor="middle">TOPP 10</text>
          </svg>
        </div>
        <div class="title-block">
          <div class="brand">HISTORY GO</div>
          <h1>{{TITLE}}</h1>
          <p>Quizkort · Topp 10</p>
        </div>
        <div class="hg-badge" aria-label="History Go badge">
          <span>HG</span>
          <small>HISTORY<br />GO</small>
        </div>
      </header>

      <div class="ribbon">{{RIBBON}}</div>

      <section class="questions questions-left" aria-label="Spørsmål 1 til 5">
        {{LEFT_QUESTIONS}}
      </section>
      <section class="questions questions-right" aria-label="Spørsmål 6 til 10">
        {{RIGHT_QUESTIONS}}
      </section>

      <footer class="answer-key">
        <strong>Fasit:</strong> {{ANSWER_KEY}}
      </footer>
    </section>
  </main>
</body>
</html>
